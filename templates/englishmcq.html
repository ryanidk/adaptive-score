<!DOCTYPE html>
<html data-bs-theme="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Adaptive Practice - Adaptive Score</title>
    <meta name="description" content="Adaptive Score is an adaptive SAT preparation platform with adaptive practice that adjusts question difficulty based on performance and diagnostics, as well as generate full-length tests with vocabulary.">
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800&amp;display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/Pricing-Centered-badges.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/Pricing-Centered-icons.css') }}">
</head>

<body>
    <nav class="navbar navbar-expand-md sticky-top py-3 navbar-shrink" id="mainNav">
        <div class="container"><a class="navbar-brand d-flex align-items-center" href="/"><span class="bs-icon-sm bs-icon-circle bs-icon-primary shadow d-flex justify-content-center align-items-center me-2 bs-icon"><svg class="bi bi-check-circle" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"></path>
                        <path d="m10.97 4.97-.02.022-3.473 4.425-2.093-2.094a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-1.071-1.05"></path>
                    </svg></span><span>Adaptive Score</span></a><button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navcol-1"><span class="visually-hidden">Toggle navigation</span><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navcol-1">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="/"></a></li>
                </ul>
                <h1 class="fw-bold"></h1>
                <p class="navbar-text" style="margin-right: 30px;margin-bottom: 0px;">{{ name }} ({{ email }})</p><a class="btn btn-primary shadow" role="button" href="/logout">Log out</a>
            </div>
        </div>
    </nav>
    <section class="py-4">
    <div class="container-fluid">
        <form id="response" action="#" method="POST">
             <input type="hidden" id="question_id" name="question_id" value="{{ question_id }}">
            <div class="row g-0" style="min-height: 80vh;">
                <div class="col-lg-6 border-end">
                    <div class="p-4" style="max-width: 700px; margin: auto; line-height: 1.6;">

                        {{ stimulus | safe }}

                    </div>
                </div>

                <div class="col-lg-6">
                    <div class="p-4" style="max-width: 700px; margin: auto;">

                        <div class="mb-3">
    <div class="text-muted small mb-1">Skill: {{ skill }} | Difficulty: {{ difficulty }}</div>
    <p class="mb-0">
        {{ stem | safe }}
                        </p>
                        </div>

                        <div class="d-grid gap-2">

                            <label class="choice-box p-3">
                                <input type="radio" name="answer" value="A">
                                <span class="choice-letter">A</span>
                                <span>
                                    {{ option_A | safe }}
                                </span>
                            </label>

                            <label class="choice-box p-3">
                                <input type="radio" name="answer" value="B">
                                <span class="choice-letter">B</span>
                                <span>
                                    {{ option_B | safe }}
                                </span>
                            </label>

                            <label class="choice-box p-3">
                                <input type="radio" name="answer" value="C">
                                <span class="choice-letter">C</span>
                                <span>
                                    {{ option_C | safe }}
                                </span>
                            </label>

                            <label class="choice-box p-3">
                                <input type="radio" name="answer" value="D">
                                <span class="choice-letter">D</span>
                                <span>
                                    {{ option_D | safe }}
                                </span>
                            </label>

                                <div id="errorMsg" class="text-danger small mt-2"></div>


                        </div>

                        <div class="mt-4 d-flex justify-content-end">
                            <button type="submit" class="btn btn-primary px-4">
                                Submit
                            </button>
                        </div>

                    </div>
                </div>

            </div>
        </form>
    </div>
</section>
    <footer class="bg-primary-gradient">
        <div class="container py-4 py-lg-5">
            <p class="mb-0">Copyright © 2026 Adaptive Score. We are not affiliated with CollegeBoard, the SAT, or any other trademark in any way.</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/bold-and-bright.js') }}"></script>

<script>
    const errorMsg = document.getElementById("errorMsg");

    // Source - https://stackoverflow.com/a/13060348
    // Posted by Michael Berkowski, modified by community. See post 'Timeline' for change history
    // Retrieved 2026-05-07, License - CC BY-SA 3.0

    function isOneChecked() {
        // All <input> tags...
        var chx = document.getElementsByTagName('input');
        for (var i = 0; i < chx.length; i++) {
            // If you have more than one radio group, also check the name attribute
            // for the one you want as in && chx[i].name == 'choose'
            // Return true from the function on first match of a checked item
            if (chx[i].type == 'radio' && chx[i].checked) {
                return true;
            }
        }
        // End of the loop, return false
        return false;
    }


    document.getElementById("response").addEventListener("submit", function (event) {
        if (!isOneChecked()) {
            event.preventDefault();
            errorMsg.textContent = "Please select an answer.";
        }
    });
</script>

</body>

</html>
